name: Test extension

on:
  push:
  pull_request:

jobs:
  render:
    name: Quarto ${{ matrix.quarto }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        quarto: ["1.5.0", "release"]
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ matrix.quarto }}
      - name: Install knitr
        run: Rscript -e 'install.packages("knitr", repos = "https://cloud.r-project.org")'
      - name: Render fixtures and inspect HTML
        run: Rscript --vanilla tests/test-rendering.R .
      - name: Render Revealjs themes
        run: |
          for theme in default cosmo beige dark moon; do
            quarto render tests/fixtures/revealjs-tables.qmd --output-dir "/tmp/reveal-${theme}" -M "theme:${theme}"
          done
